# Change app, primary_region, and PUBLIC_BASE_URL for the deployed Fly app.
app = "ai-secretary"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/secretary.db"
  NODE_ENV = "production"
  PORT = "3000"
  PUBLIC_BASE_URL = "https://ai-secretary.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  # This service answers phone calls, so keep at least one machine always
  # running rather than auto-stopping (which would drop or delay live calls).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[mounts]]
  source = "secretary_data"
  destination = "/data"
